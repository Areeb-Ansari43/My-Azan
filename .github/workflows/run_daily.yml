name: Daily Azan Trigger
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 10 * * *'
    - cron: '0 14 * * *'
    - cron: '0 18 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:
jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: pip install requests pytz
    - name: Run Scheduler
      env:
        VIRTUAL_DOORBELL_URL: ${{ secrets.VIRTUAL_DOORBELL_URL }}
      run: python azan_scheduler.py
