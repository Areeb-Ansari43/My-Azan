name: Daily Azan Trigger

on:
  push:
    branches:
      - main
  schedule:
    # Run every minute during prayer time windows (UK time)
    # Note: GitHub cron uses UTC, so adjust times
    - cron: '*/1 1-6 * * *'   # 1 AM - 6 AM UTC (2 AM - 7 AM UK for Fajr)
    - cron: '*/1 11-14 * * *' # 11 AM - 2 PM UTC (12 PM - 3 PM UK for Dhuhr)
    - cron: '*/1 15-18 * * *' # 3 PM - 6 PM UTC (4 PM - 7 PM UK for Asr)
    - cron: '*/1 19-21 * * *' # 7 PM - 9 PM UTC (8 PM - 10 PM UK for Maghrib/Isha)
  workflow_dispatch:

jobs:
  check-prayer:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Check and Trigger Prayer
      env:
        VIRTUAL_DOORBELL_URL: ${{ secrets.VIRTUAL_DOORBELL_URL }}
        VOICE_MONKEY_TOKEN: ${{ secrets.VOICE_MONKEY_TOKEN }}
        VOICE_MONKEY_ACCESS_CODE: ${{ secrets.VOICE_MONKEY_ACCESS_CODE }}
      run: |
        python -c "
