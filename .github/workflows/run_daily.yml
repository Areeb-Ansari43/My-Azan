name: Daily Azan Trigger

on:
  schedule:
    - cron: '0 1 * * *' # Wakes up every night automatically to look up Luton times
  workflow_dispatch: # This adds the manual "Run workflow" button you need for testing

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: pip install -r requirements.txt
    - name: Run Scheduler
      env:
        VIRTUAL_DOORBELL_URL: ${{ secrets.VIRTUAL_DOORBELL_URL }}
      run: python azan_scheduler.py
