name: Daily Azan Trigger

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-prayer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests pytz
      
      - name: Run prayer check
        env:
          VIRTUAL_DOORBELL_URL: ${{ secrets.VIRTUAL_DOORBELL_URL }}
          VOICE_MONKEY_TOKEN: ${{ secrets.VOICE_MONKEY_TOKEN }}
          VOICE_MONKEY_ACCESS_CODE: ${{ secrets.VOICE_MONKEY_ACCESS_CODE }}
        run: |
          python azan_scheduler.py
