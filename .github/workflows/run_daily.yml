if today_times:
    for prayer, time in today_times.items():
        if current_time == time:
            print(f'[INFO] Time for {prayer} at {time} - triggering')
            
            # Trigger Virtual Doorbell (Speech)
            webhook = os.environ.get('VIRTUAL_DOORBELL_URL')
            if webhook:
                try:
                    separator = '&' if '?' in webhook else '?'
                    url = f'{webhook}{separator}prayer={prayer}&ptime={time}'
                    r = requests.get(url, timeout=10)
                    print(f'[OK] Speech triggered: {r.status_code}')
                except Exception as e:
                    print(f'[ERROR] Speech failed: {e}')
            
            # Trigger Voice Monkey (MP3)
            voice_token = os.environ.get('VOICE_MONKEY_TOKEN')
            voice_code = os.environ.get('VOICE_MONKEY_ACCESS_CODE')
            if voice_token and voice_code:
                try:
                    vm_url = f'https://api-v2.voicemonkey.io/trigger?token={voice_token}&device=PrayerTimeTrigger&access_code={voice_code}&prayer={prayer}'
