name: Daily Azan Trigger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: pip install requests pytz
    - name: Run Scheduler
      env:
        VOICE_MONKEY_TOKEN: ${{ secrets.VOICE_MONKEY_TOKEN }}
        VOICE_MONKEY_ACCESS_CODE: ${{ secrets.VOICE_MONKEY_ACCESS_CODE }}
      run: python azan_scheduler.py
