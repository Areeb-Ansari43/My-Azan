import requests
from datetime import datetime
import pytz
import json

local_tz = pytz.timezone('Europe/London')
now = datetime.now(local_tz)
current_time = now.strftime('%H:%M')

# June 2026 Timetable - Luton Central Mosque
TIMETABLE = {
